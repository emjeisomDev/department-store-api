##################################################
# APPLICATION
##################################################
spring.application.name=department-store-api

##################################################
# SERVER
##################################################
server.port=8080


##################################################
# DATASOURCE
##################################################
spring.datasource.url=jdbc:postgresql://localhost:5432/department_store_db
spring.datasource.username=department_store_app
spring.datasource.password=department_store_password
spring.datasource.driver-class-name=org.postgresql.Driver

##################################################
# HIKARI CONNECTION POOL
##################################################
spring.datasource.hikari.pool-name=DepartmentStoreHikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

##################################################
# JPA / HIBERNATE
##################################################
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

##################################################
# FLYWAY
##################################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

##################################################
# LOGGING
##################################################
logging.level.root=info
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=DEBUG

##################################################
# ACTUATOR
##################################################
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always